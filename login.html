<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Readora - Login</title>
    <link rel="stylesheet" href="login.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
</head>
<body style="background-image: url('images/ebooks.webp'); background-size: cover;">

<div class="container">

    <div class="form-box login"> 
        <form>
            <h1>Login</h1>
            <div class="input-box">
                <input type="email" id="loginEmail" placeholder="Email" required>
                <i class="bx bxs-envelope"></i>
            </div>
            <div class="input-box">
                <input type="password" id="loginPassword" placeholder="Password" required>
                <i class="bx bxs-lock-alt"></i>
            </div>
            <div class="forgot-link">
                <a href="#">Forgot password</a>
            </div>
            <button type="button" class="btn" onclick="login()">Login</button>
        </form>
    </div>

    <div class="form-box register">
        <form>
            <h1>Register</h1>
            <div class="input-box">
                <input type="text" placeholder="Username" required>
                <i class="bx bxs-user"></i>
            </div>
            <div class="input-box">
                <input type="email" placeholder="Email" id="registerEmail" required>
                <i class="bx bxs-envelope"></i>
            </div>
            <div class="input-box">
                <input type="password" placeholder="Password" id="registerPassword" required>
                <i class="bx bxs-lock-alt"></i>
            </div>
            <button type="button" class="btn" onclick="register()">Register</button>
        </form>
    </div>

    <div class="toggle-box">
        <div class="toggle-panel toggle-left">
            <h1>Hello, Welcome</h1>
            <p>Don't have an account?</p>
            <button class="btn register-btn" type="button">Register</button>
        </div>
        <div class="toggle-panel toggle-right">
            <h1>Welcome Back</h1>
            <p>Already have an account?</p>
            <button class="btn login-btn" type="button">Login</button>
        </div>
    </div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="java.js"></script>

</body>
</html>
